<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ved AI Chatbot</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #eef2f6;
      color: #18212f;
    }

    .chat-shell {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .chat-panel {
      width: min(920px, 100%);
      height: min(760px, calc(100vh - 48px));
      display: grid;
      grid-template-rows: auto 1fr auto;
      background: #ffffff;
      border: 1px solid #d8e0ea;
      border-radius: 8px;
      box-shadow: 0 18px 45px rgba(24, 33, 47, 0.12);
      overflow: hidden;
    }

    .chat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 20px 24px;
      background: #18212f;
      color: #ffffff;
    }

    .eyebrow {
      margin: 0 0 4px;
      color: #9bd0ff;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
    }

    h1 {
      margin: 0;
      font-size: 30px;
    }

    .status {
      padding: 8px 12px;
      border: 1px solid rgba(255, 255, 255, 0.3);
      border-radius: 999px;
      font-size: 14px;
    }

    .chat-messages {
      overflow-y: auto;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      background: #f8fafc;
    }

    .message {
      max-width: 78%;
      padding: 13px 15px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    .message p {
      margin: 0;
    }

    .message.user {
      align-self: flex-end;
      background: #2563eb;
      color: #ffffff;
    }

    .message.bot {
      align-self: flex-start;
      background: #ffffff;
      border: 1px solid #d8e0ea;
    }

    .message.loading {
      color: #607086;
    }

    .chat-form {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 12px;
      padding: 18px;
      border-top: 1px solid #d8e0ea;
      background: #ffffff;
    }

    input {
      width: 100%;
      border: 1px solid #c8d2df;
      border-radius: 8px;
      padding: 13px 14px;
      font-size: 16px;
    }

    input:focus {
      outline: 2px solid #9bd0ff;
      border-color: #2563eb;
    }

    button {
      border: 0;
      border-radius: 8px;
      padding: 0 22px;
      background: #18212f;
      color: #ffffff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    @media (max-width: 640px) {
      .chat-shell {
        padding: 0;
      }

      .chat-panel {
        min-height: 100vh;
        height: 100vh;
        border-radius: 0;
      }

      .chat-header {
        padding: 16px;
      }

      .chat-messages {
        padding: 16px;
      }

      .message {
        max-width: 92%;
      }

      .chat-form {
        grid-template-columns: 1fr;
      }

      button {
        min-height: 46px;
      }
    }
  </style>
</head>
<body>
  <main class="chat-shell">
    <section class="chat-panel" aria-label="Ved AI chatbot">
      <header class="chat-header">
        <div>
          <p class="eyebrow">AI Assistant</p>
          <h1>Ved</h1>
        </div>
        <span class="status">Online</span>
      </header>

      <div id="chatMessages" class="chat-messages">
        <article class="message bot">
          <p>Hi, I am Ved. Ask me anything and I will help you step by step.</p>
        </article>
      </div>

      <form id="chatForm" class="chat-form">
        <input
          id="messageInput"
          type="text"
          autocomplete="off"
          placeholder="Message Ved..."
          aria-label="Message Ved"
          required
        />
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <script>
    const chatForm = document.querySelector("#chatForm");
    const messageInput = document.querySelector("#messageInput");
    const chatMessages = document.querySelector("#chatMessages");

    const history = [];

    function addMessage(role, content, extraClass = "") {
      const message = document.createElement("article");
      message.className = `message ${role === "user" ? "user" : "bot"} ${extraClass}`.trim();

      const text = document.createElement("p");
      text.textContent = content;
      message.appendChild(text);

      chatMessages.appendChild(message);
      chatMessages.scrollTop = chatMessages.scrollHeight;
      return message;
    }

    chatForm.addEventListener("submit", async (event) => {
      event.preventDefault();

      const message = messageInput.value.trim();
      if (!message) return;

      addMessage("user", message);
      history.push({ role: "user", content: message });
      messageInput.value = "";
      messageInput.focus();

      const button = chatForm.querySelector("button");
      button.disabled = true;
      const loadingMessage = addMessage("assistant", "Ved is thinking...", "loading");

      try {
        const response = await fetch("/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            message,
            history: history.slice(0, -1),
          }),
        });

        const data = await response.json();
        loadingMessage.remove();

        if (!response.ok) {
          throw new Error(data.error || "Something went wrong.");
        }

        addMessage("assistant", data.reply);
        history.push({ role: "assistant", content: data.reply });
      } catch (error) {
        loadingMessage.remove();
        addMessage("assistant", error.message);
      } finally {
        button.disabled = false;
      }
    });
  </script>
</body>
</html>
