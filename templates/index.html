<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ved AI Chatbot</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}" />
</head>
<body>
  <main class="chat-shell">
    <section class="chat-panel" aria-label="Ved AI chatbot">
      <header class="chat-header">
        <div>
          <p class="eyebrow">AI Assistant</p>
          <h1>Ved</h1>
        </div>
        <span class="status">Online</span>
      </header>

      <div id="chatMessages" class="chat-messages">
        <article class="message bot">
          <p>Hi, I am Ved. Ask me anything and I will help you step by step.</p>
        </article>
      </div>

      <form id="chatForm" class="chat-form">
        <input
          id="messageInput"
          type="text"
          autocomplete="off"
          placeholder="Message Ved..."
          aria-label="Message Ved"
          required
        />
        <button type="submit">Send</button>
      </form>
    </section>
  </main>

  <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
